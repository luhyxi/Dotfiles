# -- General Settings ---
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g mouse on
set-option -g set-clipboard external
set-window-option -g mode-keys vi

# --- Custom Keybindings ---
# Switch windows with Alt+H / Alt+L
bind -n M-H previous-window
bind -n M-L next-window

# Vi-style copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Catppuccin Theme Config ---
set -g @plugin 'catppuccin/tmux#v2.1.3'


# --- Resurrect Config ---
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Global Status Bar Layout
set -g status-left ""
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_default_text "#W"

set -g @catppuccin_window_text " #{b:pane_current_path} "
set -g @catppuccin_window_current_text " #{b:pane_current_path} "

# --- Initialization ---
# Keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'
